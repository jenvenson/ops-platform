version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ${MYSQL_CONTAINER_NAME:-ops-mysql}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?err}
      MYSQL_DATABASE: ops_platform
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ops-network

  redis:
    image: redis:7.4-alpine
    container_name: ${REDIS_CONTAINER_NAME:-ops-redis}
    command: redis-server --requirepass ${REDIS_PASSWORD:?err}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT_PUBLISHED:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ops-network

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: ${BACKEND_CONTAINER_NAME:-ops-backend}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_NAME=ops_platform
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JENKINS_URL=${JENKINS_URL}
      - JENKINS_USERNAME=${JENKINS_USERNAME}
      - JENKINS_TOKEN=${JENKINS_TOKEN}
      - JENKINS_TIMEOUT=${JENKINS_TIMEOUT}
      - GRAFANA_URL=${GRAFANA_URL:-http://localhost:3000}
      - GRAFANA_USERNAME=${GRAFANA_USERNAME:-}
      - GRAFANA_PASSWORD=${GRAFANA_PASSWORD:-}
    volumes:
      - ../docs:/app/docs:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ops-network

  nginx:
    image: nginx:alpine
    container_name: ${NGINX_CONTAINER_NAME:-ops-nginx}
    ports:
      - "${NGINX_PORT:-80}:80"
    environment:
      - GRAFANA_UPSTREAM=${GRAFANA_UPSTREAM:-http://your-grafana-host:3000/}
      - GRAFANA_HOST_HEADER=${GRAFANA_HOST_HEADER:-your-grafana-host:3000}
      - GRAFANA_BASIC_AUTH=${GRAFANA_BASIC_AUTH:-}
      - GRAFANA_APP_URL=${GRAFANA_APP_URL:-http://localhost:3000/}
    volumes:
      - ./nginx.prod.conf.template:/etc/nginx/templates/nginx.prod.conf.template:ro
      - ./nginx/html:/var/www/html
    command:
      - /bin/sh
      - -c
      - envsubst '$$GRAFANA_UPSTREAM $$GRAFANA_HOST_HEADER $$GRAFANA_BASIC_AUTH $$GRAFANA_APP_URL' < /etc/nginx/templates/nginx.prod.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ops-network

volumes:
  mysql-data:
  redis-data:

networks:
  ops-network:
    driver: bridge
