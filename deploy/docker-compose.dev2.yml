version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ops-mysql-2
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ops_platform
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "23306:3306"
    volumes:
      - mysql-data-2:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - ops-network-2

  redis:
    image: redis:7.4-alpine
    container_name: ops-redis-2
    command: redis-server --requirepass ${REDIS_PASSWORD:?err}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis-data-2:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - ops-network-2

  backend:
    image: golang:1.25-alpine
    container_name: ops-backend-dev-2
    ports:
      - "8081:8080"
    environment:
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_NAME=ops_platform
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JENKINS_URL=${JENKINS_URL}
      - JENKINS_USERNAME=${JENKINS_USERNAME}
      - JENKINS_TOKEN=${JENKINS_TOKEN}
      - JENKINS_TIMEOUT=${JENKINS_TIMEOUT}
      - GRAFANA_URL=${GRAFANA_URL:-http://your-grafana-host:3000}
      - GRAFANA_USERNAME=${GRAFANA_USERNAME:-admin}
      - GRAFANA_PASSWORD=${GRAFANA_PASSWORD:-}
      - ASSISTANT_ENABLED=false
      - ASSISTANT_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://docker-host:11434
      - OLLAMA_CHAT_MODEL=qwen3:8b
      - OLLAMA_EMBED_MODEL=qwen3-embedding:4b
      - ASSISTANT_REQUEST_TIMEOUT_SEC=60
      - ASSISTANT_API_KEY=${ASSISTANT_API_KEY:-}
      - ASSISTANT_BASE_URL=${ASSISTANT_BASE_URL:-}
      - ASSISTANT_CHAT_MODEL=${ASSISTANT_CHAT_MODEL:-}
      - ASSISTANT_EMBED_MODEL=${ASSISTANT_EMBED_MODEL:-}
      - OPS_NMAP_PROFILE=dev
      - OPS_BROWSER_DISCOVERY_URL=http://ops-browser-helper-2:31730/discover
      - NUCLEI_VERSION=v3.6.2
      - NUCLEI_VERSION=${NUCLEI_VERSION:-v3.6.2}
      - NUCLEI_BINARY_URL=${NUCLEI_BINARY_URL:-https://github.com/projectdiscovery/nuclei/releases/download/v3.6.2/nuclei_3.6.2_linux_amd64.zip}
      - FIM_SSH_USER=${FIM_SSH_USER:-}
      - FIM_SSH_PASSWORD=${FIM_SSH_PASSWORD:-}
      - FIM_SSH_PRIVATE_KEY=${FIM_SSH_PRIVATE_KEY:-}
      - FIM_SSH_PRIVATE_KEY_PATH=${FIM_SSH_PRIVATE_KEY_PATH:-}
      - FIM_SSH_TIMEOUT_SEC=${FIM_SSH_TIMEOUT_SEC:-15}
    volumes:
      - ../backend:/app/backend
      - ../deploy:/app/deploy:ro
      - ../docs:/app/docs:ro
      - ../migrations:/app/migrations:ro
    working_dir: /app/backend
    extra_hosts:
      - "docker-host:host-gateway"
    entrypoint: ["/bin/sh", "/app/backend/start.sh"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      browser-helper:
        condition: service_started
    restart: unless-stopped
    networks:
      - ops-network-2

  browser-helper:
    image: mcr.microsoft.com/playwright:v1.58.1-jammy
    container_name: ops-browser-helper-2
    working_dir: /app
    volumes:
      - ../frontend:/app
      - browser-helper-node_modules-2:/app/node_modules
    command: sh -c "test -d /app/node_modules/playwright && node ./scripts/browser-discovery-server.cjs || npm install && node ./scripts/browser-discovery-server.cjs"
    shm_size: "1gb"
    restart: unless-stopped
    networks:
      - ops-network-2

  frontend:
    image: node:20-alpine
    container_name: ops-frontend-dev-2
    ports:
      - "5175:5173"
    volumes:
      - ../frontend:/app
      - frontend-node_modules-2:/app/node_modules
    working_dir: /app
    command: sh -c "test -d /app/node_modules && npm run dev || npm install && npm run dev"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - ops-network-2

  nginx:
    image: nginx:alpine
    container_name: ops-nginx-dev-2
    ports:
      - "8891:80"
    environment:
      - GRAFANA_UPSTREAM=${GRAFANA_UPSTREAM:-http://your-grafana-host:3000/}
      - GRAFANA_HOST_HEADER=${GRAFANA_HOST_HEADER:-your-grafana-host:3000}
      - GRAFANA_BASIC_AUTH=${GRAFANA_BASIC_AUTH:-}
      - GRAFANA_APP_URL=${GRAFANA_APP_URL:-http://localhost:3000/}
    volumes:
      - ./nginx.conf.dev2.template:/etc/nginx/templates/nginx.conf.dev2.template:ro
    extra_hosts:
      - "docker-host:host-gateway"
    command:
      - /bin/sh
      - -c
      - envsubst '$$GRAFANA_UPSTREAM $$GRAFANA_HOST_HEADER $$GRAFANA_BASIC_AUTH $$GRAFANA_APP_URL' < /etc/nginx/templates/nginx.conf.dev2.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - ops-network-2

networks:
  ops-network-2:
    driver: bridge

volumes:
  mysql-data-2:
  redis-data-2:
  frontend-node_modules-2:
  browser-helper-node_modules-2:
